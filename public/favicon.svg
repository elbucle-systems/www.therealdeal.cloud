<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Green badge background -->
  <rect width="32" height="32" rx="6" fill="#059669"/>
  <!-- White ball -->
  <circle cx="16" cy="16" r="10" fill="white"/>
  <!-- Central black pentagon  (regular pentagon, pointing up, radius 4.5) -->
  <polygon points="16,11.5 20.3,14.6 18.6,19.6 13.4,19.6 11.7,14.6" fill="#111"/>
  <!-- Seam lines: from each pentagon vertex to the ball circumference -->
  <line x1="16"   y1="11.5" x2="16"   y2="6"    stroke="#111" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20.3" y1="14.6" x2="25.5" y2="12.9"  stroke="#111" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18.6" y1="19.6" x2="21.9" y2="24.1"  stroke="#111" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="13.4" y1="19.6" x2="10.1" y2="24.1"  stroke="#111" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="11.7" y1="14.6" x2="6.5"  y2="12.9"  stroke="#111" stroke-width="1.2" stroke-linecap="round"/>
</svg>
